apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ai-dqn-decision
  namespace: default
spec:
  args:
    - name: rollout-name
    - name: target-weight
  metrics:
    - name: ai-judgment
      interval: 30s
      count: 4
      initialDelay: 90s
      # --- 1. TĂNG SỨC CHỊU ĐỰNG LỖI MẠNG (HTTP 500, Timeout) ---
      # Cho phép Agent lỗi kết nối hoặc Prometheus timeout tối đa 5 lần liên tiếp
      consecutiveErrorLimit: 5
      # --- 2. XỬ LÝ TRẠNG THÁI "CHỜ" CỦA AI ---
      # Cho phép AI Agent trả về "Running" nhiều lần hơn trước khi pause rollout
      inconclusiveLimit: 4
      provider:
        web:
          url: "http://canary-ai-agent-svc.default.svc.cluster.local/predict"
          method: POST
          timeoutSeconds: 120
          headers:
            - key: "Content-Type"
              value: "application/json"
          jsonBody:
            app_info:
              name: "{{args.rollout-name}}"
              weight: "{{args.target-weight}}"
              namespace: "default"
              canary_service: "api-gateway-canary"
              stable_service: "api-gateway-stable"
              pod_selector: "api-gateway-rollout-.*"
      # --- 3. ĐỊNH NGHĨA LẠI LUỒNG LOGIC QUYẾT ĐỊNH ---
      successCondition: "result.decision == 'Successful'"
      failureCondition: "result.decision == 'Rollback'"
      # Thêm dòng này: Khi AI trả về "Running", Argo sẽ hiểu là "Chưa quyết định được, thử lại ở nhịp sau"
