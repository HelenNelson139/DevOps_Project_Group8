apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-ai-agent
  namespace: default
  labels:
    app: canary-ai-agent
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: canary-ai-agent
  template:
    metadata:
      labels:
        app: canary-ai-agent
    spec:
      containers:
      - name: ai-agent
        image: uitdkhpacr2026.azurecr.io/canary-ai-agent:latest
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        env:
        - name: SAFETY_GUARD_ENABLED
          value: "false"  # <--- Tắt lớp giáp bảo vệ tại đây
        - name: MODEL_PATH
          value: models/model_canary_drqn_best.pth
        - name: PROMETHEUS_URL
          value: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
---
apiVersion: v1
kind: Service
metadata:
  name: canary-ai-agent-svc
  namespace: default
spec:
  selector:
    app: canary-ai-agent
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000