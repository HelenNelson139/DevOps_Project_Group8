apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-ai-agent
  namespace: default
  labels:
    app: canary-ai-agent
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: canary-ai-agent
  template:
    metadata:
      labels:
        app: canary-ai-agent
    spec:
      containers:
        - name: ai-agent
          image: 'uitdkhpacr2026.azurecr.io/canary-ai-agent:c2c59470e46eff78149478a739b6529d3b2b394b'
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: SAFETY_GUARD_ENABLED
              value: "true"
            - name: MODEL_PATH
              value: models/model_canary_drqn_best.pth
            - name: PROMETHEUS_URL
              value: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: canary-ai-agent-svc
  namespace: default
spec:
  selector:
    app: canary-ai-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
