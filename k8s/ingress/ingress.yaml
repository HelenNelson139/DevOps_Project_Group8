apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uit-dkhp-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false" 
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 80
