apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          # TODO: Cập nhật ACR url (vd: uitdkhpacr2026.azurecr.io/auth-service:latest)
          image: 'uitdkhpacr2026.azurecr.io/auth-service:91ce0b8d755859895607f31e7e98769a1a278d01'
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: uit-dkhp-config
            - secretRef:
                name: uit-dkhp-secret
          env:
            - name: PORT
              value: "3001"
            - name: SERVICE_NAME
              value: auth-service
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  selector:
    app: auth-service
