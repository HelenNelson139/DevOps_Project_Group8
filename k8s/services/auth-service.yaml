apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        # TODO: Cập nhật ACR url (vd: uitdkhpacr2026.azurecr.io/auth-service:latest)
        image: uitdkhpacr2026.azurecr.io/auth-service:492e5ca5160e9dbec0c5f3677c333b6c755b0008
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - name: http
          containerPort: 3001
        envFrom:
        - configMapRef:
            name: uit-dkhp-config
        - secretRef:
            name: uit-dkhp-secret
        env:
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  ports:
  - name: http
    port: 3001
    targetPort: 3001
  selector:
    app: auth-service
