apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
        - name: registration-service
          image: 'uitdkhpacr2026.azurecr.io/registration-service:54de17472dc54a9fe007201cef69e435064d5e98'
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: http
              containerPort: 3003
          envFrom:
            - configMapRef:
                name: uit-dkhp-config
            - secretRef:
                name: uit-dkhp-secret
          env:
            - name: PORT
              value: "3003"
            - name: SERVICE_NAME
              value: registration-service
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
  labels:
    app: registration-service
spec:
  ports:
    - name: http
      port: 3003
      targetPort: 3003
  selector:
    app: registration-service
