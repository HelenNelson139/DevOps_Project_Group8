apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
    spec:
      containers:
      - name: course-service
        image: YOUR_ACR.azurecr.io/course-service:latest
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: uit-dkhp-config
        - secretRef:
            name: uit-dkhp-secret
        env:
        - name: PORT
          value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
spec:
  ports:
  - port: 3002
  selector:
    app: course-service
