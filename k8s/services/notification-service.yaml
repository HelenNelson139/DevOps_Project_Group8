apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: uitdkhpacr2026.azurecr.io/notification-service:latest
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        ports:
        - name: http
          containerPort: 3004
        envFrom:
        - configMapRef:
            name: uit-dkhp-config
        - secretRef:
            name: uit-dkhp-secret
        env:
        - name: PORT
          value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  ports:
  - name: http
    port: 3004
    targetPort: 3004
  selector:
    app: notification-service
