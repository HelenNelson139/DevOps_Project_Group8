apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: uit-course-basic-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: uit-course.basic
      rules:
        - alert: PodCrashLooping
          expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",namespace=~"default|argocd|monitoring"}[5m]) >= 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} has been in CrashLoopBackOff for more than 5 minutes."

        - alert: PodNotReady
          expr: sum by (namespace, pod) (max_over_time(kube_pod_status_phase{phase=~"Pending|Unknown|Failed",namespace=~"default|argocd|monitoring"}[10m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending, Unknown, or Failed for more than 10 minutes."

        - alert: DeploymentReplicasUnavailable
          expr: kube_deployment_spec_replicas{namespace=~"default|argocd|monitoring"} > kube_deployment_status_replicas_available{namespace=~"default|argocd|monitoring"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment has unavailable replicas"
            description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} does not have all desired replicas available."

        - alert: HPAAtMaxReplicas
          expr: kube_horizontalpodautoscaler_status_current_replicas{namespace="default"} == kube_horizontalpodautoscaler_spec_max_replicas{namespace="default"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "HPA reached max replicas"
            description: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} has been at max replicas for more than 10 minutes."

        - alert: PrometheusTargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Prometheus target is down"
            description: "Prometheus target {{ $labels.job }} / {{ $labels.instance }} has been down for more than 5 minutes."
