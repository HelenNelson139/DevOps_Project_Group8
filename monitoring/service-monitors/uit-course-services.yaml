apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: uit-course-services
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: uit-course
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - auth-service
          - course-service
          - registration-service
          - notification-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
