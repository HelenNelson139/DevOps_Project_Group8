apiVersion: v1
kind: ConfigMap
metadata:
  name: uit-course-services-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: uit-course
data:
  uit-course-services.json: |-
    {
      "uid": "uit-course-services",
      "title": "UIT Course Services",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["uit-course", "microservices"],
      "timezone": "browser",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate by service",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (service) (rate(uit_course_http_requests_total[5m]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "5xx error rate by service",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (service) (rate(uit_course_http_requests_total{status_code=~\"5..\"}[5m])) / clamp_min(sum by (service) (rate(uit_course_http_requests_total[5m])), 0.001)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "p95 latency by service",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(uit_course_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Node.js heap used",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "refId": "A",
              "expr": "uit_course_nodejs_memory_bytes{type=\"heap_used\"}",
              "legendFormat": "{{service}}"
            }
          ]
        }
      ]
    }
