apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-canary-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: uit-course
data:
  api-gateway-canary.json: |-
    {
      "uid": "api-gateway-canary",
      "title": "API Gateway Canary",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["uit-course", "canary", "api-gateway"],
      "timezone": "browser",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Gateway scrape",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "max(up{namespace=\"default\", service=~\"api-gateway-stable|api-gateway-canary\"})",
              "legendFormat": "api-gateway"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Gateway RPS",
          "gridPos": {"h": 5, "w": 18, "x": 6, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (service) (rate(api_gateway_http_requests_total{namespace=\"default\",service=~\"api-gateway-stable|api-gateway-canary\"}[5m]))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Gateway 5xx",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 5},
          "targets": [
            {
              "refId": "A",
              "expr": "(sum by (service) (rate(api_gateway_http_requests_total{namespace=\"default\",service=~\"api-gateway-stable|api-gateway-canary\",status_code=~\"5..\"}[5m])) / clamp_min(sum by (service) (rate(api_gateway_http_requests_total{namespace=\"default\",service=~\"api-gateway-stable|api-gateway-canary\"}[5m])), 0.001)) or on(service) (0 * sum by (service) (rate(api_gateway_http_requests_total{namespace=\"default\",service=~\"api-gateway-stable|api-gateway-canary\"}[5m])))",
              "legendFormat": "{{service}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit"
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Gateway P95",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 5},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (service, le) (rate(api_gateway_http_request_duration_seconds_bucket{namespace=\"default\",service=~\"api-gateway-stable|api-gateway-canary\"}[5m])))",
              "legendFormat": "{{service}}"
            }
          ]
        }
      ]
    }
