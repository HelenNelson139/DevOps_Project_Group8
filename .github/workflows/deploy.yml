name: CI/CD Pipeline for Microservices on AKS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:
  validate:
    name: Validate Node applications
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend
          - services/auth
          - services/course
          - services/registration
          - services/notification

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Run unit tests
        working-directory: ${{ matrix.app }}
        run: npm run test:ci --if-present

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

  validate-ai-agent:
    name: Validate Python AI Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ai-agent
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        working-directory: ai-agent
        run: pytest

      - name: Check Python syntax
        run: python -m py_compile ai-agent/main.py ai-agent/train.py ai-agent/core/*.py

  build-and-push:
    name: Build and Push Images to ACR
    needs:
      - validate
      - validate-ai-agent
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - course-service
          - registration-service
          - notification-service
          - api-gateway
          - canary-ai-agent
          - db-migration

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        if: github.event_name != 'pull_request'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        if: github.event_name != 'pull_request'
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            CONTEXT="."
            DOCKERFILE="Dockerfile.gateway"
          elif [ "${{ matrix.service }}" = "canary-ai-agent" ]; then
            CONTEXT="ai-agent"
            DOCKERFILE="ai-agent/Dockerfile"
          elif [ "${{ matrix.service }}" = "db-migration" ]; then
            CONTEXT="database"
            DOCKERFILE="database/Dockerfile"
          else
            DIR_NAME=$(echo "${{ matrix.service }}" | sed 's/-service//')
            CONTEXT="services/$DIR_NAME"
            DOCKERFILE="$CONTEXT/Dockerfile"
          fi

          IMAGE_NAME="${{ matrix.service }}"
          TAG="${{ github.sha }}"

          echo "Building $IMAGE_NAME with context $CONTEXT and Dockerfile $DOCKERFILE..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            docker build -t "$IMAGE_NAME:pr-$TAG" -f "$DOCKERFILE" "$CONTEXT"
          else
            docker build \
              -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:$TAG" \
              -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" \
              -f "$DOCKERFILE" \
              "$CONTEXT"
          fi

      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_NAME="${{ matrix.service }}"
          TAG="${{ github.sha }}"

          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:$TAG"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

  update-gitops-manifests:
    name: Update GitOps manifests for Argo CD
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update Kubernetes Manifests
        run: |
          IMAGE_TAG="${{ github.sha }}"
          SERVICES="auth-service course-service registration-service notification-service api-gateway canary-ai-agent db-migration"

          echo "Updating Kubernetes manifests to use immutable image tag: $IMAGE_TAG"

          for service in $SERVICES; do
            find k8s/services k8s/rollouts k8s/jobs -name "*.yaml" -exec \
              sed -i -E "s|image: .*/${service}:.*|image: ${ACR_LOGIN_SERVER}/${service}:${IMAGE_TAG}|g" {} +
          done

          find k8s/services k8s/rollouts k8s/jobs -name "*.yaml" -exec \
            sed -i "s|YOUR_ACR.azurecr.io|${ACR_LOGIN_SERVER}|g" {} +

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/services k8s/rollouts k8s/jobs

          if git diff --cached --quiet; then
            echo "No manifest image tag changes to commit."
            exit 0
          fi

          git commit -m "Update image tags to ${{ github.sha }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
