# UIT Đăng ký học phần - Nginx reverse proxy and static frontend
# API routes are proxied to backend services; SPA is served from /usr/share/nginx/html
# Use variables + resolver so upstream hosts are resolved at request time (gateway can start before backends).

worker_processes 1;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Docker embedded DNS (resolve upstreams at request time, not at nginx startup)
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # API routes - proxy to microservices (variable so host is resolved per request)
        location /api/auth/ {
            set $auth_backend "auth-service:3001";
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://$auth_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/courses/ {
            set $course_backend "course-service:3002";
            rewrite ^/api/courses/(.*)$ /$1 break;
            proxy_pass http://$course_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
        }
        location /api/registrations/ {
            set $registration_backend "registration-service:3003";
            rewrite ^/api/registrations/(.*)$ /$1 break;
            proxy_pass http://$registration_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/notifications/ {
            set $notification_backend "notification-service:3004";
            rewrite ^/api/notifications/(.*)$ /$1 break;
            proxy_pass http://$notification_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback - serve index.html for non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
